name: CI

on:
  workflow_dispatch:  # manual trigger only

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pytest tests -q

  performance:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      # Bundle size check (no browser needed)
      - name: Check bundle size
        run: npx playwright test --config perf/playwright.perf.config.ts perf/tests/07-bundle-size.spec.ts

      # Install Playwright Chromium
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Lighthouse CI (3 runs, desktop preset)
      - name: Run Lighthouse CI
        run: npx lhci autorun
        continue-on-error: true

      # Playwright perf tests against production
      - name: Run performance tests
        run: npx playwright test --config perf/playwright.perf.config.ts --reporter=json --project=desktop > perf/reports/latest.json 2>&1 || true
        env:
          PERF_BASE_URL: https://atlas.argonanalytics.org

      # Upload reports
      - name: Upload performance reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-reports
          path: |
            perf/reports/
            .lighthouseci/
          retention-days: 30
